services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - ENV=production
      - DATABASE_URL=postgresql://marpol_user:marpol_pass@db:5432/marpol_db
    restart: always
    depends_on:
      - db

  db:
    image: postgis/postgis:15-3.3
    restart: always
    environment:
      POSTGRES_USER: marpol_user
      POSTGRES_PASSWORD: marpol_pass
      POSTGRES_DB: marpol_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: